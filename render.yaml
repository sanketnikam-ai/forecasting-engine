services:
  - type: web
    name: forecasting-engine
    env: python
    buildCommand: "pip install -r requirements.txt && pip install -r requirements_web.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 4 --timeout 300 app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    healthCheckPath: /health
